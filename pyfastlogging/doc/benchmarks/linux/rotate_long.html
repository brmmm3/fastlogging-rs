<!DOCTYPE html>
<html>

<head>
  <title>Logging benchmark results</title>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <script type="text/javascript">
    google.charts.load('current', { 'packages': ['bar'] });
    google.charts.setOnLoadCallback(drawChart);

    function drawChart() {
      var data = google.visualization.arrayToDataTable([
        ['Log level', 'logging', 'logging Optimized', 'loguru', 'fastlogging DIRECT', 'fastlogging THREADS', 'fastlogging-rs Logging', 'fastlogging-rs root'],
        ['DEBUG',  3.3691,  3.3031,  6.4358,  0.8097,  1.3852,  0.2262,  0.2002],
        ['INFO',  2.5707,  2.5036,  5.3564,  0.6376,  1.1079,  0.1615,  0.1625],
        ['WARNING',  2.0026,  1.9236,  4.0076,  0.5009,  0.9191,  0.1351,  0.1248],
        ['ERROR',  1.3975,  1.4472,  2.6478,  0.3774,  0.5858,  0.0805,  0.0818],
        ['CRITICAL',  0.7218,  0.6864,  1.4021,  0.1959,  0.3336,  0.0526,  0.0507]
      ]);

      var options = {
        chart: {
          title: 'Rotating log file',
        },
        bars: 'horizontal' // Required for Material Bar Charts.
      };

      var chart = new google.charts.Bar(document.getElementById('barchart_material'));

      chart.draw(data, google.charts.Bar.convertOptions(options));
    }
  </script>
</head>

<body>
  <div id="barchart_material" style="width: 900px; height: 500px;"></div>
</body>

</html>
