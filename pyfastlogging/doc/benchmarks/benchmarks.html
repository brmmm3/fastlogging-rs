<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Benchmarks - pyfastlogging</title>
  <style>
    :root {
      --bg: #070b14;
      --panel: rgba(19, 27, 46, 0.72);
      --border: rgba(148, 163, 184, 0.2);
      --text: #e6eeff;
      --muted: #9fb0d9;
      --good: #34d399;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1100px 700px at -20% -10%, #1a3a7a44, transparent 60%),
        radial-gradient(1100px 700px at 120% 110%, #6f1f7f44, transparent 60%),
        var(--bg);
      min-height: 100vh;
    }
    .wrap {
      width: min(1600px, 94vw);
      margin: 22px auto 34px;
      display: grid;
      gap: 14px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px #00000040;
    }
    h1 { margin: 0; font-size: clamp(24px, 3vw, 34px); }
    .sub { margin-top: 8px; color: var(--muted); }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
    }
    label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    select {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0b1220;
      color: var(--text);
      font-size: 14px;
      padding: 10px;
    }
    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
    }
    .kpi {
      border: 1px solid #ffffff22;
      border-radius: 12px;
      padding: 12px;
      background: #0b1325aa;
    }
    .kpi-name { font-weight: 700; margin-bottom: 6px; }
    .kpi-main { font-size: 22px; }
    .kpi-sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .pill {
      display: inline-block;
      background: linear-gradient(135deg, #6ee7b7, #34d399);
      color: #062016;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-top: 7px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td { padding: 9px 10px; border-bottom: 1px solid #ffffff14; text-align: left; }
    th { background: #0a1325; color: #c9d6ff; position: sticky; top: 0; }
    tr:hover td { background: #ffffff08; }
    .best { color: var(--good); font-weight: 700; }
    .bars { display: grid; gap: 10px; }
    .row {
      background: #0b1325;
      border: 1px solid #ffffff12;
      border-radius: 12px;
      padding: 10px;
    }
    .row-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 7px;
      color: #c8d5ff;
      font-size: 13px;
    }
    .bar-item { margin-top: 7px; }
    .bar-label { color: var(--muted); font-size: 12px; margin-bottom: 3px; }
    .bar {
      height: 10px;
      border-radius: 999px;
      background: #0f1a31;
      border: 1px solid #ffffff12;
      overflow: hidden;
    }
    .fill { height: 100%; border-radius: 999px; }
    .note { color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>pyfastlogging Benchmark Dashboard</h1>
      <div class="sub">Interactive view generated from HTML files in <code>pyfastlogging/doc/benchmarks</code>. Lower values are faster.</div>
    </section>

    <section class="card controls">
        <div>
          <label for="os">OS</label>
          <select id="os">
            <option value="linux">Linux</option>
            <option value="windows">Windows</option>
          </select>
        </div>
        <div>
          <label for="sink">Sink</label>
          <select id="sink">
            <option value="nolog">No log file</option>
            <option value="file">Log file</option>
            <option value="rotate">Rotating log file</option>
          </select>
        </div>
      <div>
        <label for="size">Message size</label>
        <select id="size">
          <option value="short">short</option>
          <option value="long">long</option>
        </select>
      </div>
      <div>
        <label for="exc">Exception benchmark mode</label>
        <select id="exc">
          <option value="noexc">noexc</option>
          <option value="exc">exc</option>
        </select>
      </div>
    </section>

    <section class="card">
      <div class="kpis" id="kpis"></div>
    </section>

    <section class="card" style="overflow:auto">
      <table id="table"></table>
    </section>

    <section class="card">
      <div class="bars" id="bars"></div>
    </section>

    <section class="card note">
      Source files: file_*.html, nolog_*.html, rotate_*.html (+ *_exc_* variants) in the linux/windows benchmark folder.
    </section>
  </main>

    const COLORS = {
      "logging": "#fb7185",
      "logging OPTIMIZED": "#f59e0b",
      "loguru": "#facc15",
      "fastlogging": "#22d3ee",
      "fastlogging THREADS": "#38bdf8",
      "fastlogging-rs Logging": "#60a5fa",
      "fastlogging-rs root": "#34d399"
    };

    const LEVELS = ["DEBUG", "INFO", "WARNING", "ERROR", "CRITICAL"];
    const sel = (id) => document.getElementById(id);
    const fmt = (n) => Number(n).toFixed(4);

    function getCurrent() {
      return DATA[sel("os").value][sel("sink").value][sel("size").value][sel("exc").value];
    }

    function sortedFrameworks(series) {
      const names = Object.keys(series[LEVELS[0]]);
      return names.map((name) => {
        const vals = LEVELS.map((l) => series[l][name]);
        const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
        return { name, avg, min: Math.min(...vals), max: Math.max(...vals) };
      }).sort((a, b) => a.avg - b.avg);
    }

    function renderKpis(series) {
      const rank = sortedFrameworks(series);
      const fastest = rank[0].avg;
      document.getElementById("kpis").innerHTML = rank.map((r, i) => `
        <article class="kpi">
          <div class="kpi-name" style="color:${COLORS[r.name] || "#ddd"}">${r.name}</div>
          <div class="kpi-main">${fmt(r.avg)} ms</div>
          <div class="kpi-sub">avg latency (${fmt(r.min)} - ${fmt(r.max)} ms)</div>
          <div class="kpi-sub">${(r.avg / fastest).toFixed(2)}x of fastest</div>
          ${i === 0 ? '<span class="pill">Fastest in current selection</span>' : ""}
        </article>
      `).join("");
    }

    function renderTable(series) {
      const frameworks = Object.keys(series.DEBUG);
      const head = `
        <thead><tr>
          <th>Level</th>
          ${frameworks.map((f) => `<th>${f}</th>`).join("")}
          <th>Winner</th>
        </tr></thead>`;

      const rows = LEVELS.map((lvl) => {
        const values = frameworks.map((f) => ({ f, v: series[lvl][f] }));
        const winner = values.reduce((a, b) => a.v <= b.v ? a : b);
        return `<tr>
          <td>${lvl}</td>
          ${values.map((x) => `<td class="${x.f === winner.f ? "best" : ""}">${fmt(x.v)}</td>`).join("")}
          <td class="best">${winner.f}</td>
        </tr>`;
      }).join("");

      document.getElementById("table").innerHTML = `${head}<tbody>${rows}</tbody>`;
    }

    function renderBars(series) {
      const frameworks = Object.keys(series.DEBUG);
      const max = Math.max(...LEVELS.flatMap((lvl) => frameworks.map((f) => series[lvl][f])));
      document.getElementById("bars").innerHTML = LEVELS.map((lvl) => {
        const vals = frameworks.map((f) => ({ f, v: series[lvl][f] })).sort((a, b) => a.v - b.v);
        return `<section class="row">
          <div class="row-head"><strong>${lvl}</strong><span>${vals[0].f} fastest (${fmt(vals[0].v)} ms)</span></div>
          ${vals.map((x) => `
            <div class="bar-item">
              <div class="bar-label">${x.f} - ${fmt(x.v)} ms</div>
              <div class="bar"><div class="fill" style="width:${(x.v / max) * 100}%;background:${COLORS[x.f] || "#999"}"></div></div>
            </div>
          `).join("")}
        </section>`;
      }).join("");
    }

    function render() {
      const series = getCurrent();
      renderKpis(series);
      renderTable(series);
      renderBars(series);
    }

    ["os", "sink", "size", "exc"].forEach((id) => sel(id).addEventListener("change", render));
    render();
  </script>
